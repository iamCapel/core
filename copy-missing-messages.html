<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Copiar Mensajes Faltantes</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 900px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      background: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    h1 { color: #667eea; text-align: center; }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .log {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 15px;
      max-height: 400px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      margin-top: 20px;
      display: none;
    }
    .log-entry { padding: 5px; border-bottom: 1px solid #e9ecef; }
    .log-entry.success { color: #28a745; }
    .log-entry.warning { color: #ffc107; }
    .log-entry.error { color: #dc3545; }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 20px;
    }
    .stat-card {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-number { font-size: 32px; font-weight: bold; color: #667eea; }
    .stat-label { color: #666; font-size: 14px; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📨 Copiar Mensajes Faltantes</h1>
    <p style="text-align: center; color: #666;">Copia mensajes de chats viejos (con UIDs) a chats nuevos (con usernames)</p>

    <div class="stats" id="stats" style="display: none;">
      <div class="stat-card">
        <div class="stat-number" id="messagesCopied">0</div>
        <div class="stat-label">Mensajes Copiados</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="chatsUpdated">0</div>
        <div class="stat-label">Chats Actualizados</div>
      </div>
    </div>

    <button id="copyBtn" onclick="copyMissingMessages()">
      🚀 Copiar Mensajes Faltantes
    </button>

    <div class="log" id="log"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { 
      getFirestore, 
      collection, 
      getDocs, 
      doc,
      setDoc,
      query,
      orderBy
    } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAp3Z67xm1zBkiiFQqyxVpDj5TQZjTN8Ug",
      authDomain: "coredatabase-206ac.firebaseapp.com",
      projectId: "coredatabase-206ac",
      storageBucket: "coredatabase-206ac.firebasestorage.app",
      messagingSenderId: "728262620356",
      appId: "1:728262620356:web:9bed8c00797fe41bbc4b8b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const KNOWN_UIDS = {
      'NVb7MXCq4HhGPMWVeluPFPRj1vt2': 'jisidro',
      '1VJInCWPdCcuikaL5EnCWi0CYX23': 'dferrera',
      'nsv7TW2FFnUO0eFYIy1V3oHzoOC2': 'mcabrera',
      'PvTR4emsmleEunr5kZcdQsIIlub2': 'lbeltre',
    };

    function addLog(message, type = 'info') {
      const logDiv = document.getElementById('log');
      logDiv.style.display = 'block';
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function updateStats(copied, updated) {
      document.getElementById('stats').style.display = 'grid';
      document.getElementById('messagesCopied').textContent = copied;
      document.getElementById('chatsUpdated').textContent = updated;
    }

    function looksLikeFirebaseUID(str) {
      return str && str.length > 20 && /^[a-zA-Z0-9_-]+$/.test(str);
    }

    function convertChatId(oldChatId) {
      const parts = oldChatId.split('_');
      if (parts.length !== 2) return null;
      
      const usernames = parts.map(part => {
        if (looksLikeFirebaseUID(part)) {
          return KNOWN_UIDS[part] || part;
        }
        return part;
      });

      return usernames.sort().join('_');
    }

    window.copyMissingMessages = async function() {
      const btn = document.getElementById('copyBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Copiando...';
      
      document.getElementById('log').innerHTML = '';

      let totalCopied = 0;
      let chatsUpdated = 0;

      try {
        addLog('🔍 Buscando chats con UIDs...', 'info');
        const chatsRef = collection(db, 'chats');
        const chatsSnapshot = await getDocs(chatsRef);
        
        const oldChats = [];
        chatsSnapshot.forEach(chatDoc => {
          const chatId = chatDoc.id;
          const hasUID = chatId.split('_').some(part => looksLikeFirebaseUID(part));
          if (hasUID) {
            const newChatId = convertChatId(chatId);
            if (newChatId && newChatId !== chatId) {
              oldChats.push({ oldId: chatId, newId: newChatId });
            }
          }
        });

        addLog(`📊 Encontrados ${oldChats.length} chats con UIDs`, 'info');

        for (const { oldId, newId } of oldChats) {
          addLog(`\n🔄 Procesando: ${oldId} → ${newId}`, 'info');

          // Obtener mensajes del chat viejo
          const oldMessagesRef = collection(db, 'chats', oldId, 'messages');
          const oldMessagesQuery = query(oldMessagesRef, orderBy('timestamp', 'asc'));
          const oldMessagesSnap = await getDocs(oldMessagesQuery);

          if (oldMessagesSnap.empty) {
            addLog(`   ℹ️ No hay mensajes en ${oldId}`, 'info');
            continue;
          }

          addLog(`   📨 ${oldMessagesSnap.size} mensajes en chat viejo`, 'info');

          // Obtener mensajes del chat nuevo
          const newMessagesRef = collection(db, 'chats', newId, 'messages');
          const newMessagesSnap = await getDocs(newMessagesRef);
          
          const existingIds = new Set();
          newMessagesSnap.forEach(doc => existingIds.add(doc.id));

          addLog(`   📊 ${existingIds.size} mensajes ya en chat nuevo`, 'info');

          let copiedThisChat = 0;

          for (const msgDoc of oldMessagesSnap.docs) {
            if (existingIds.has(msgDoc.id)) {
              continue; // Ya existe
            }

            const msgData = msgDoc.data();
            const newMsgRef = doc(db, 'chats', newId, 'messages', msgDoc.id);

            // Convertir senderId si es UID
            let senderId = msgData.senderId;
            if (looksLikeFirebaseUID(senderId)) {
              senderId = KNOWN_UIDS[senderId] || senderId;
            }

            const newMsgData = {
              ...msgData,
              senderId,
              username: senderId
            };

            await setDoc(newMsgRef, newMsgData);
            copiedThisChat++;
            totalCopied++;
          }

          if (copiedThisChat > 0) {
            addLog(`   ✅ ${copiedThisChat} mensajes nuevos copiados`, 'success');
            chatsUpdated++;
            updateStats(totalCopied, chatsUpdated);
          } else {
            addLog(`   ✓ Chat ya está actualizado`, 'info');
          }
        }

        addLog(`\n🎉 Proceso completado: ${totalCopied} mensajes copiados en ${chatsUpdated} chats`, 'success');
        
      } catch (error) {
        addLog(`❌ Error: ${error.message}`, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '🔄 Copiar de Nuevo';
      }
    };
  </script>
</body>
</html>
