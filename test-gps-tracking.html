<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico GPS Tracking</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .status-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
        }
        .status-box.success {
            border-left-color: #2ecc71;
            background: #e8f8f5;
        }
        .status-box.error {
            border-left-color: #e74c3c;
            background: #fadbd8;
        }
        .status-box.warning {
            border-left-color: #f39c12;
            background: #fef5e7;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: all 0.3s;
        }
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .user-location {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            transition: all 0.3s;
        }
        .user-location:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        .user-location.active {
            border-color: #2ecc71;
            background: #e8f8f5;
        }
        .user-location.inactive {
            border-color: #e74c3c;
            background: #fadbd8;
            opacity: 0.7;
        }
        .username {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 8px;
        }
        .location-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            font-size: 14px;
            color: #555;
        }
        .location-info div {
            padding: 5px;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
        .badge.live {
            background: #2ecc71;
            color: white;
        }
        .badge.offline {
            background: #e74c3c;
            color: white;
        }
        .badge.old {
            background: #f39c12;
            color: white;
        }
        #map {
            width: 100%;
            height: 400px;
            border-radius: 8px;
            margin: 20px 0;
            background: #f8f9fa;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
        }
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Diagnóstico de Sistema GPS</h1>
        <p class="subtitle">Herramienta para verificar el tracking GPS en tiempo real</p>

        <div class="status-box" id="connectionStatus">
            <strong>🔗 Estado de Conexión:</strong> <span id="connectionText">Verificando...</span>
        </div>

        <div style="margin: 20px 0;">
            <button onclick="checkAllLocations()">🔍 Verificar Ubicaciones</button>
            <button onclick="startRealTimeMonitoring()">📡 Monitoreo en Tiempo Real</button>
            <button onclick="stopRealTimeMonitoring()">⏸️ Detener Monitoreo</button>
            <button onclick="clearDisplay()">🗑️ Limpiar</button>
        </div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat-card">
                <div class="stat-label">Total Usuarios</div>
                <div class="stat-number" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">En Vivo (< 2 min)</div>
                <div class="stat-number" id="liveUsers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Recientes (< 10 min)</div>
                <div class="stat-number" id="recentUsers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Inactivos</div>
                <div class="stat-number" id="inactiveUsers">0</div>
            </div>
        </div>

        <div id="results"></div>
        <div id="realtimeStatus" style="display: none;"></div>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, onValue, get, off } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBDlu3ec1f5r2s-wh5d_Z0JcZxrvKyTGws",
            authDomain: "mopc-reporting.firebaseapp.com",
            databaseURL: "https://mopc-reporting-default-rtdb.firebaseio.com",
            projectId: "mopc-reporting",
            storageBucket: "mopc-reporting.firebasestorage.app",
            messagingSenderId: "659936292238",
            appId: "1:659936292238:web:f51f1d9eb062f0f53c5e00"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let monitoringInterval = null;
        let realtimeListener = null;

        // Verificar conexión a Firebase
        const connectedRef = ref(db, '.info/connected');
        onValue(connectedRef, (snapshot) => {
            const statusBox = document.getElementById('connectionStatus');
            const statusText = document.getElementById('connectionText');
            
            if (snapshot.val() === true) {
                statusBox.className = 'status-box success';
                statusText.textContent = '✅ Conectado a Firebase';
            } else {
                statusBox.className = 'status-box error';
                statusText.textContent = '❌ Desconectado de Firebase';
            }
        });

        // Función para verificar todas las ubicaciones
        window.checkAllLocations = async function() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Cargando ubicaciones...</p></div>';
            
            try {
                const locationsRef = ref(db, 'userLocations');
                const snapshot = await get(locationsRef);
                
                if (!snapshot.exists()) {
                    resultsDiv.innerHTML = `
                        <div class="status-box warning">
                            <strong>⚠️ No hay ubicaciones registradas</strong>
                            <p>Ningún usuario ha compartido su ubicación aún.</p>
                            <p><strong>Instrucciones:</strong></p>
                            <ol>
                                <li>Abre la app CORE-APK en un dispositivo móvil</li>
                                <li>Inicia sesión con un usuario</li>
                                <li>Acepta los permisos de ubicación</li>
                                <li>Espera 10-15 segundos</li>
                                <li>Vuelve a presionar "Verificar Ubicaciones"</li>
                            </ol>
                        </div>
                    `;
                    updateStats(0, 0, 0, 0);
                    return;
                }

                const data = snapshot.val();
                const locations = [];
                let liveCount = 0;
                let recentCount = 0;
                let inactiveCount = 0;

                Object.keys(data).forEach(username => {
                    const loc = data[username];
                    const lastUpdate = new Date(loc.lastUpdate);
                    const now = new Date();
                    const diffMinutes = (now - lastUpdate) / 1000 / 60;
                    
                    let status = 'inactive';
                    let statusBadge = '<span class="badge offline">OFFLINE</span>';
                    
                    if (diffMinutes < 2) {
                        status = 'live';
                        statusBadge = '<span class="badge live">🔴 EN VIVO</span>';
                        liveCount++;
                    } else if (diffMinutes < 10) {
                        status = 'recent';
                        statusBadge = '<span class="badge old">RECIENTE</span>';
                        recentCount++;
                    } else {
                        inactiveCount++;
                    }

                    locations.push({
                        username,
                        ...loc,
                        lastUpdate,
                        diffMinutes,
                        status,
                        statusBadge
                    });
                });

                // Ordenar por más reciente primero
                locations.sort((a, b) => b.lastUpdate - a.lastUpdate);

                let html = '<h2>📍 Ubicaciones Encontradas</h2>';
                
                locations.forEach(loc => {
                    html += `
                        <div class="user-location ${loc.status}">
                            <div class="username">
                                👤 ${loc.username}
                                ${loc.statusBadge}
                            </div>
                            <div class="location-info">
                                <div><strong>📍 Coordenadas:</strong><br>${loc.latitude.toFixed(6)}, ${loc.longitude.toFixed(6)}</div>
                                <div><strong>🎯 Precisión:</strong><br>±${Math.round(loc.accuracy || 0)} metros</div>
                                <div><strong>⏰ Última actualización:</strong><br>${loc.lastUpdate.toLocaleString('es-DO')}</div>
                                <div><strong>⏱️ Hace:</strong><br>${formatTimeDiff(loc.diffMinutes)}</div>
                                ${loc.speed ? `<div><strong>🚗 Velocidad:</strong><br>${Math.round(loc.speed * 3.6)} km/h</div>` : ''}
                                ${loc.heading ? `<div><strong>🧭 Dirección:</strong><br>${Math.round(loc.heading)}°</div>` : ''}
                            </div>
                            <div style="margin-top: 10px;">
                                <a href="https://www.google.com/maps?q=${loc.latitude},${loc.longitude}" 
                                   target="_blank" 
                                   style="color: #667eea; text-decoration: none; font-weight: bold;">
                                   🗺️ Ver en Google Maps →
                                </a>
                            </div>
                        </div>
                    `;
                });

                resultsDiv.innerHTML = html;
                updateStats(locations.length, liveCount, recentCount, inactiveCount);

            } catch (error) {
                console.error('Error:', error);
                resultsDiv.innerHTML = `
                    <div class="status-box error">
                        <strong>❌ Error al cargar ubicaciones</strong>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        };

        // Función para monitoreo en tiempo real
        window.startRealTimeMonitoring = function() {
            if (realtimeListener) {
                alert('El monitoreo en tiempo real ya está activo');
                return;
            }

            const statusDiv = document.getElementById('realtimeStatus');
            statusDiv.style.display = 'block';
            statusDiv.innerHTML = `
                <div class="status-box success">
                    <strong>📡 Monitoreo en Tiempo Real ACTIVO</strong>
                    <p>Las ubicaciones se actualizarán automáticamente cuando cambien.</p>
                </div>
            `;

            const locationsRef = ref(db, 'userLocations');
            realtimeListener = onValue(locationsRef, (snapshot) => {
                console.log('🔄 Actualización en tiempo real recibida');
                checkAllLocations();
            });
        };

        // Detener monitoreo en tiempo real
        window.stopRealTimeMonitoring = function() {
            if (realtimeListener) {
                const locationsRef = ref(db, 'userLocations');
                off(locationsRef, 'value', realtimeListener);
                realtimeListener = null;
                
                const statusDiv = document.getElementById('realtimeStatus');
                statusDiv.innerHTML = `
                    <div class="status-box warning">
                        <strong>⏸️ Monitoreo en Tiempo Real DETENIDO</strong>
                    </div>
                `;
                
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 3000);
            }
        };

        // Limpiar pantalla
        window.clearDisplay = function() {
            document.getElementById('results').innerHTML = '';
            document.getElementById('stats').style.display = 'none';
            stopRealTimeMonitoring();
        };

        // Actualizar estadísticas
        function updateStats(total, live, recent, inactive) {
            document.getElementById('stats').style.display = 'grid';
            document.getElementById('totalUsers').textContent = total;
            document.getElementById('liveUsers').textContent = live;
            document.getElementById('recentUsers').textContent = recent;
            document.getElementById('inactiveUsers').textContent = inactive;
        }

        // Formatear diferencia de tiempo
        function formatTimeDiff(minutes) {
            if (minutes < 1) return 'Menos de 1 minuto';
            if (minutes < 60) return `${Math.round(minutes)} minuto${Math.round(minutes) !== 1 ? 's' : ''}`;
            const hours = Math.floor(minutes / 60);
            return `${hours} hora${hours !== 1 ? 's' : ''}`;
        }

        // Cargar ubicaciones al inicio
        window.addEventListener('load', () => {
            setTimeout(checkAllLocations, 1000);
        });
    </script>
</body>
</html>
